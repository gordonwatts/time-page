<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Committee History Viewer - Committee History</title>
  <style>:root {
  --bg: #f8fafc;
  --panel: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #475569;
  --timeline-line: #cbd5e1;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: "Segoe UI", Tahoma, sans-serif; background: var(--bg); color: var(--text); }
.page { width: min(1760px, 100%); margin: 0 auto; padding: 24px; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); }
.hero { padding: 20px; display: flex; gap: 16px; justify-content: space-between; align-items: flex-end; }
h1 { margin: 0; font-size: 1.8rem; }
.subtitle { margin: 8px 0 0; color: var(--muted); }
.search { display: grid; gap: 6px; min-width: 328px; font-size: 0.85rem; color: var(--muted); }
.search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; }
input { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 0.95rem; }
.search-clear { width: 2.5rem; height: 2.5rem; border: 1px solid var(--border); border-radius: 999px; background: #fff; color: var(--muted); font-size: 1rem; line-height: 1; cursor: pointer; }
.search-clear:hover { background: #f8fafc; color: var(--text); }
.search-clear:focus-visible { outline: 2px solid #94a3b8; outline-offset: 2px; }
.search-clear.hidden { visibility: hidden; pointer-events: none; }
.split { margin-top: 20px; display: grid; grid-template-columns: minmax(0, 2.2fr) minmax(360px, 1fr); gap: 16px; align-items: start; }
.panel { height: 78vh; padding: 16px; overflow: auto; }
.detail { min-width: 0; }
.panel-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
.panel-pills { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
h2 { margin: 0; font-size: 1.2rem; }
h3 { margin-bottom: 6px; }
h4 { margin: 14px 0 8px; font-size: 0.95rem; }
h5 { margin: 0; font-size: 0.95rem; }
h6 { margin: 0 0 8px; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 10px; }
.summary { border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; padding: 12px; }
.summary p { line-height: 1.5; }
.summary pre { overflow: auto; }
.summary table { width: 100%; border-collapse: collapse; table-layout: auto; }
.summary th, .summary td { padding: 6px 8px; vertical-align: top; }
.summary th + th, .summary td + td { border-left: 1px solid var(--border); }
.summary thead th { border-bottom: 1px solid var(--border); }
.summary th:nth-child(1), .summary td:nth-child(1),
.summary th:nth-child(2), .summary td:nth-child(2) { white-space: normal; }
.summary th:nth-child(3), .summary td:nth-child(3) { white-space: nowrap; }
.document-item { margin-bottom: 10px; }
.document-meta { margin-bottom: 4px; line-height: 1.35; display: grid; gap: 2px; }
.document-file a, .document-file { word-break: break-word; }
.document-sublist { margin: 0; padding-left: 18px; }
.document-sublist li { margin: 4px 0; }
.contribution-list { display: grid; gap: 12px; }
.contribution-card { border: 1px solid var(--border); border-radius: 14px; background: #fff; padding: 12px; display: grid; gap: 10px; }
.contribution-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.contribution-minutes { margin-top: 2px; }
.contribution-documents ul { margin: 0; padding-left: 18px; }
.contribution-documents li { margin: 4px 0; }
.timeline-list { position: relative; padding-left: 0; }
.timeline-list::before { content: ""; position: absolute; left: 13px; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--border), var(--timeline-line)); }
.year-block { position: relative; }
.year { display: inline-block; font-size: 0.75rem; color: var(--muted); background: #fff; border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; margin: 8px 0 10px 28px; position: sticky; top: 0; z-index: 2; }
.timeline-divider { position: relative; margin: 14px 0 12px; padding-left: 28px; min-height: 24px; display: flex; align-items: center; }
.timeline-divider-line { position: absolute; left: 22px; right: 0; top: 50%; height: 2px; background: var(--timeline-line); border-radius: 999px; transform: translateY(-50%); }
.timeline-divider-pill { position: relative; z-index: 1; margin-left: 8px; padding: 2px 10px; border: 1px solid var(--border); border-radius: 999px; background: #fff; color: var(--muted); font-size: 0.72rem; }
.timeline-item { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; border-radius: 12px; padding: 8px 8px 8px 0; margin-bottom: 6px; display: grid; grid-template-columns: 28px minmax(0, 1fr); align-items: stretch; gap: 10px; cursor: pointer; }
.timeline-item:hover { background: #f8fafc; }
.timeline-item.selected { border-color: #0f172a; box-shadow: 0 0 0 2px #cbd5e1; }
.timeline-content { min-width: 0; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 10px 12px; border-radius: 12px; background: #fff; border: 1px solid var(--border); }
.timeline-item.minor .timeline-content { padding-top: 8px; padding-bottom: 8px; }
.timeline-item.minor .title { font-size: 0.8rem; }
.timeline-rail { position: relative; display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
.dot { position: relative; z-index: 1; width: 12px; height: 12px; border-radius: 999px; border: 2px solid rgba(15, 23, 42, 0.25); }
.connector { position: absolute; top: 15px; left: 50%; width: 18px; height: 2px; background: var(--timeline-line); transform: translateX(0); }
.timeline-item.major .short { grid-column: 2 / 4; font-size: 0.75rem; color: var(--muted); }
.date { font-size: 0.73rem; color: var(--muted); white-space: nowrap; }
.title { min-width: 0; overflow-wrap: anywhere; }
.pill { border-radius: 999px; padding: 2px 8px; font-size: 0.72rem; border: 1px solid transparent; white-space: nowrap; }
.pill.small { padding: 1px 6px; font-size: 0.65rem; }
.timeline-pills { display: inline-flex; flex-wrap: wrap; justify-content: flex-end; gap: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: inline-block; border: 1px solid var(--border); background: #fff; border-radius: 999px; padding: 2px 8px; font-size: 0.75rem; }
.chip.muted { color: var(--muted); }
.muted-text { color: var(--muted); font-size: 0.85rem; }
.error { max-width: 820px; margin: 24px auto; border: 1px solid #fecaca; background: #fee2e2; color: #991b1b; border-radius: 12px; padding: 16px; }
@media (max-width: 1024px) {
  .hero { flex-direction: column; align-items: stretch; }
  .split {
    grid-template-columns: 1fr;
    grid-template-areas:
      "timeline"
      "detail";
  }
  .panel { height: auto; max-height: 72vh; }
  .timeline {
    grid-area: timeline;
    max-height: min(24rem, 46vh);
  }
  .detail {
    grid-area: detail;
    max-height: none;
  }
}
@media (max-width: 720px) {
  .page { padding: 16px; }
  .search-row { grid-template-columns: minmax(0, 1fr) 2.25rem; }
  .timeline-content { grid-template-columns: 1fr; }
  .timeline-item.major .short { grid-column: 1; }
  .timeline-pills { justify-content: flex-start; }
}
</style>
</head>

  <script id="committee-data" type="application/json">{"schema_version": "1.0", "metadata": {"name": "Committee History Viewer", "subtitle": "Single project file with local entries + Indico sources", "description_md": "This project uses one master YAML file.\n\n- Local committee records live in `events`.\n- Indico categories are configured in `indico_category_sources`.\n- `committee build` fetches meetings for those sources during build.\n", "notes_md": "Markdown and math are supported:\n\n$$\n\\int_0^1 x^2 dx = \\frac{1}{3}\n$$\n"}, "date_window": {"start_date": "2024-01-01", "end_date": "2024-12-31"}, "event_type_styles": {"meeting": {"label": "Meeting", "color": "sky"}, "report": {"label": "Report", "color": "emerald"}, "decision": {"label": "Decision", "color": "rose"}, "milestone": {"label": "Milestone", "color": "amber"}, "external": {"label": "External", "color": "violet"}}, "events": [{"id": "evt-001", "type": "meeting", "title": "Kickoff Meeting", "date": "2024-01-12", "important": true, "short_label": "Kickoff", "summary_md": "# Kickoff Meeting\n\nScope and cadence were established.\n\n- Monthly meetings\n- Shared repository\n", "minutes_md": "## Notes\n\nAgenda and decisions were reviewed.\n", "participants": ["A. Smith", "B. Jones", "C. Lee"], "tags": ["scope", "kickoff", "planning"], "documents": [{"label": "agenda.pdf", "url": null, "talk_title": null, "speaker_names": []}, {"label": "minutes.md", "url": null, "talk_title": null, "speaker_names": []}], "contributions": [{"title": "Detector status update", "speaker_names": ["B. Jones"], "documents": [{"label": "status-slides.pdf", "url": "https://example.org/status-slides.pdf", "talk_title": null, "speaker_names": []}], "minutes_md": "- Shared updated calibration schedule.\n- Requested focused follow-up next week.\n", "minutes_html": "<ul>\n<li>Shared updated calibration schedule.<\/li>\n<li>Requested focused follow-up next week.<\/li>\n<\/ul>\n"}], "source_name": null, "source_color": null, "summary_html": "<h1>Kickoff Meeting<\/h1>\n<p>Scope and cadence were established.<\/p>\n<ul>\n<li>Monthly meetings<\/li>\n<li>Shared repository<\/li>\n<\/ul>\n", "minutes_html": "<h2>Notes<\/h2>\n<p>Agenda and decisions were reviewed.<\/p>\n"}, {"id": "evt-002", "type": "report", "title": "Initial Findings Memo", "date": "2024-03-25", "important": false, "short_label": null, "summary_md": "## Memo Summary\n\nKey theme: **process ambiguity** slowed progress.\n", "minutes_md": null, "participants": ["Editorial subgroup"], "tags": ["report", "findings"], "documents": [{"label": "initial-findings.pdf", "url": null, "talk_title": null, "speaker_names": []}], "contributions": [], "source_name": null, "source_color": null, "summary_html": "<h2>Memo Summary<\/h2>\n<p>Key theme: <strong>process ambiguity<\/strong> slowed progress.<\/p>\n", "minutes_html": ""}], "indico_meeting_source": null, "indico_category_sources": [{"name": "cern-lhcc", "category_id": 1234, "base_url": "https://indico.cern.ch", "color": "#FCA5A5", "title_matches": ["LHCC", "plenary"], "title_exclude_patterns": ["high school"]}, {"name": "cern-upgrade", "category_id": 5678, "base_url": "https://indico.cern.ch", "color": "#93C5FD", "title_matches": [], "title_exclude_patterns": []}], "committee": {"name": "Committee History Viewer", "subtitle": "Single project file with local entries + Indico sources", "description_md": "This project uses one master YAML file.\n\n- Local committee records live in `events`.\n- Indico categories are configured in `indico_category_sources`.\n- `committee build` fetches meetings for those sources during build.\n", "notes_md": "Markdown and math are supported:\n\n$$\n\\int_0^1 x^2 dx = \\frac{1}{3}\n$$\n", "start_date": "2024-01-01", "end_date": "2024-12-31", "description_html": "<p>This project uses one master YAML file.<\/p>\n<ul>\n<li>Local committee records live in <code>events<\/code>.<\/li>\n<li>Indico categories are configured in <code>indico_category_sources<\/code>.<\/li>\n<li><code>committee build<\/code> fetches meetings for those sources during build.<\/li>\n<\/ul>\n", "notes_html": "<p>Markdown and math are supported:<\/p>\n<div class=\"math block\">\n\\int_0^1 x^2 dx = \\frac{1}{3}\n<\/div>\n"}}</script>
  <script>(() => {
  const root = document.getElementById("app");
  const dataTag = document.getElementById("committee-data");
  if (!root || !dataTag) return;

  let data;
  try {
    data = JSON.parse(dataTag.textContent || "{}");
  } catch {
    root.innerHTML = "<div class='error'>Invalid embedded committee data.</div>";
    return;
  }

  const storageKey = `committee-history:${window.location.pathname}:${data.committee?.name || "default"}`;
  const state = {
    query: "",
    selectedId: data.events?.[0]?.id ?? null,
    timelineScrollTop: 0,
  };
  const namedPalette = {
    sky: { background: "#e0f2fe", color: "#075985", border: "#bae6fd" },
    emerald: { background: "#d1fae5", color: "#065f46", border: "#a7f3d0" },
    rose: { background: "#ffe4e6", color: "#9f1239", border: "#fecdd3" },
    amber: { background: "#fef3c7", color: "#92400e", border: "#fde68a" },
    violet: { background: "#ede9fe", color: "#5b21b6", border: "#ddd6fe" },
    slate: { background: "#e2e8f0", color: "#334155", border: "#cbd5e1" },
  };

  function fmtDate(value) {
    const d = new Date(`${value}T12:00:00`);
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  }

  function fmtCompactDate(value) {
    const d = new Date(`${value}T12:00:00`);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function getStyle(type) {
    const styles = data.event_type_styles || {};
    return styles[type] || { label: type, color: "slate" };
  }

  function hexToRgb(value) {
    const normalized = String(value || "").trim();
    const shortMatch = normalized.match(/^#([0-9a-f]{3})$/i);
    if (shortMatch) {
      const [r, g, b] = shortMatch[1].split("");
      return [parseInt(r + r, 16), parseInt(g + g, 16), parseInt(b + b, 16)];
    }
    const longMatch = normalized.match(/^#([0-9a-f]{6})$/i);
    if (!longMatch) return null;
    const digits = longMatch[1];
    return [
      parseInt(digits.slice(0, 2), 16),
      parseInt(digits.slice(2, 4), 16),
      parseInt(digits.slice(4, 6), 16),
    ];
  }

  function rgbToHex(rgb) {
    return `#${rgb.map((value) => Math.max(0, Math.min(255, value)).toString(16).padStart(2, "0")).join("")}`;
  }

  function mix(rgb, target, weight) {
    return rgb.map((value, index) => Math.round(value + (target[index] - value) * weight));
  }

  function buildTone(value) {
    if (namedPalette[value]) return namedPalette[value];
    const rgb = hexToRgb(value);
    if (!rgb) return namedPalette.slate;
    return {
      background: rgbToHex(rgb),
      color: "#0f172a",
      border: rgbToHex(mix(rgb, [15, 23, 42], 0.14)),
    };
  }

  function eventMatches(event, query) {
    const q = query.trim().toLowerCase();
    if (!q) return true;
    const contributionBits = (event.contributions || []).flatMap((contribution) => [
      contribution.title,
      contribution.minutes_md,
      ...(contribution.speaker_names || []),
    ]);
    const haystack = [event.title, event.type, event.summary_md, event.minutes_md, ...(event.tags || []), ...(event.participants || []), ...contributionBits]
      .join(" ")
      .toLowerCase();
    return haystack.includes(q);
  }

  function groupedByYear(events) {
    const grouped = new Map();
    for (const event of events) {
      const year = new Date(`${event.date}T12:00:00`).getFullYear().toString();
      if (!grouped.has(year)) grouped.set(year, []);
      grouped.get(year).push(event);
    }
    return [...grouped.entries()].sort((a, b) => Number(a[0]) - Number(b[0]));
  }

  function esc(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function styleAttr(tone) {
    return `style="background:${esc(tone.background)};color:${esc(tone.color)};border-color:${esc(tone.border)}"`;
  }

  function dotStyleAttr(tone) {
    return `style="background:${esc(tone.background)};border-color:${esc(tone.border)}"`;
  }

  function renderPill(label, color, extraClass = "") {
    const tone = buildTone(color);
    const className = extraClass ? `pill ${extraClass}` : "pill";
    return `<span class="${esc(className)}" ${styleAttr(tone)}>${esc(label)}</span>`;
  }

  function renderDoc(doc) {
    return doc.url
      ? `<a href="${esc(doc.url)}" target="_blank" rel="noopener noreferrer">${esc(doc.label)}</a>`
      : esc(doc.label);
  }

  function escapeRegExp(value) {
    return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function looksLikeIdentifierTitle(value) {
    const normalized = String(value).replace(/\s+/g, " ").trim();
    if (!normalized) return true;
    if (/^[A-Z0-9!._/-]+$/.test(normalized)) return true;
    const letters = (normalized.match(/[A-Za-z]/g) || []).length;
    const words = normalized.split(/\s+/).filter(Boolean);
    return words.length === 1 && letters <= 8;
  }

  function shortTalkTitle(group) {
    const normalizedTalkTitle = String(group.talkTitle || "").replace(/\s+/g, " ").trim();
    if (normalizedTalkTitle) {
      return normalizedTalkTitle;
    }

    const source = group.docs?.[0]?.label || "";
    let value = String(source).replace(/\.[^.]+$/, "");
    value = value.replace(/([a-z0-9])([A-Z])/g, "$1 $2");
    value = value.replace(/[_-]+/g, " ");
    value = value.replace(/\b\d{6,8}\b/g, " ");
    value = value.replace(/\b(?:amgmeeting|amg)\b/gi, " ");
    value = value.replace(/\bcopy\b/gi, " ");
    value = value.replace(/\b\d+\b\s*$/g, " ");
    for (const speaker of group.speakers || []) {
      const pattern = new RegExp(`\\b${escapeRegExp(speaker)}\\b\\s*$`, "i");
      value = value.replace(pattern, "").trim();
    }
    value = value.replace(/\s+/g, " ").trim();
    return value || source || "Untitled talk";
  }

  function groupDocuments(documents) {
    const groups = [];
    const lookup = new Map();
    for (const doc of documents || []) {
      if (!doc.talk_title && !(doc.speaker_names || []).length) {
        groups.push({ kind: "single", doc });
        continue;
      }
      const speakers = doc.speaker_names || [];
      const key = `${doc.talk_title || ""}::${speakers.join("|")}`;
      if (!lookup.has(key)) {
        const group = { kind: "talk", talkTitle: doc.talk_title || "", speakers, docs: [] };
        lookup.set(key, group);
        groups.push(group);
      }
      lookup.get(key).docs.push(doc);
    }
    return groups;
  }

  function renderDocumentGroups(documents) {
    return groupDocuments(documents).map((group) => {
      if (group.kind === "single") {
        return `<li>${renderDoc(group.doc)}</li>`;
      }
      const speakerLine = group.speakers.length ? `<span class="muted-text">${esc(group.speakers.join(", "))}</span>` : "";
      const files = group.docs.map((doc) => `<li>${renderDoc(doc)}</li>`).join("");
      return `
        <li class="document-item">
          <div class="document-meta">
            <strong>${esc(shortTalkTitle(group))}</strong>
            ${speakerLine}
          </div>
          <ul class="document-sublist">${files}</ul>
        </li>
      `;
    }).join("");
  }

  function renderContribution(contribution) {
    const speakers = (contribution.speaker_names || [])
      .map((speaker) => `<span class="chip">${esc(speaker)}</span>`)
      .join("");
    const documents = renderDocumentGroups(contribution.documents || []);
    return `
      <article class="contribution-card">
        <div class="contribution-header">
          <h5>${esc(contribution.title || "Untitled talk")}</h5>
        </div>
        <div class="chips">${speakers || "<span class='muted-text'>No speakers listed</span>"}</div>
        ${contribution.minutes_html ? `<div class="summary contribution-minutes">${contribution.minutes_html}</div>` : ""}
        <div class="contribution-documents">
          <h6>Documents</h6>
          <ul>${documents || "<li class='muted-text'>None</li>"}</ul>
        </div>
      </article>
    `;
  }

  function isEditableTarget(target) {
    if (!(target instanceof HTMLElement)) return false;
    const tagName = target.tagName;
    return target.isContentEditable || tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT";
  }

  function loadState() {
    try {
      const raw = window.sessionStorage.getItem(storageKey);
      if (!raw) return;
      const saved = JSON.parse(raw);
      if (typeof saved.query === "string") state.query = saved.query;
      if (typeof saved.selectedId === "string" && saved.selectedId) state.selectedId = saved.selectedId;
      if (Number.isFinite(saved.timelineScrollTop)) state.timelineScrollTop = saved.timelineScrollTop;
    } catch {}
  }

  function persistState() {
    try {
      window.sessionStorage.setItem(
        storageKey,
        JSON.stringify({
          query: state.query,
          selectedId: state.selectedId,
          timelineScrollTop: state.timelineScrollTop,
        }),
      );
    } catch {}
  }

  function render() {
    const previousTimeline = root.querySelector("#timeline");
    if (previousTimeline) {
      state.timelineScrollTop = previousTimeline.scrollTop;
    }
    const activeElement = document.activeElement;
    const searchWasFocused = activeElement?.id === "search";
    const searchSelectionStart = searchWasFocused ? activeElement.selectionStart : null;
    const searchSelectionEnd = searchWasFocused ? activeElement.selectionEnd : null;
    const showClearSearch = state.query.trim().length > 0;
    const events = (data.events || []).filter((e) => eventMatches(e, state.query));
    const selected = events.find((e) => e.id === state.selectedId) || events[0] || data.events?.[0];
    if (selected) state.selectedId = selected.id;

    const years = groupedByYear(events);
    const committee = data.committee || {};
    const start = committee.start_date ? fmtDate(committee.start_date) : "";
    const end = committee.end_date ? fmtDate(committee.end_date) : "Present";
    const todayKey = new Date().toISOString().slice(0, 10);

    root.innerHTML = `
      <div class="page">
        <header class="hero card">
          <div>
            <h1>${esc(committee.name || "Committee History")}</h1>
            <p class="subtitle">${esc(committee.subtitle || "")}</p>
            <div class="chips">
              <span class="chip">${esc(start)} -> ${esc(end)}</span>
            </div>
          </div>
          <label class="search">
            <span>Search</span>
            <div class="search-row">
              <input id="search" value="${esc(state.query)}" placeholder="Search events, participants, tags..." />
              <button
                type="button"
                class="search-clear${showClearSearch ? "" : " hidden"}"
                aria-label="Clear search"
                title="Clear search"
                ${showClearSearch ? "" : "tabindex=\"-1\" aria-hidden=\"true\""}
              >x</button>
            </div>
          </label>
        </header>
        <main class="split">
          <section class="card panel detail" id="detail"></section>
          <section class="card panel timeline" id="timeline"></section>
        </main>
      </div>
    `;

    const detail = root.querySelector("#detail");
    const timeline = root.querySelector("#timeline");
    if (!selected) {
      detail.innerHTML = "<p>No events available.</p>";
      timeline.innerHTML = "<p>No events available.</p>";
      return;
    }

    const selectedStyle = getStyle(selected.type);
    const docs = renderDocumentGroups(selected.documents || []);
    const contributions = (selected.contributions || []).map((contribution) => renderContribution(contribution)).join("");
    const participants = (selected.participants || []).map((p) => `<span class="chip">${esc(p)}</span>`).join("");
    const tags = (selected.tags || []).map((t) => `<span class="chip muted">${esc(t)}</span>`).join("");
    const selectedSourcePill = selected.source_name && selected.source_color
      ? renderPill(selected.source_name, selected.source_color)
      : "";
    const summarySection = selected.summary_html
      ? `<section><h4>Summary</h4><div class="summary">${selected.summary_html}</div></section>`
      : "";
    const minutesSection = selected.minutes_html
      ? `<section><h4>Minutes</h4><div class="summary">${selected.minutes_html}</div></section>`
      : "";
    const contributionsSection = contributions
      ? `<section><h4>Talk Minutes</h4><div class="contribution-list">${contributions}</div></section>`
      : "";

    detail.innerHTML = `
      <div class="panel-header"><h2>Selected Entry</h2><div class="panel-pills">${renderPill(selectedStyle.label, selectedStyle.color)}${selectedSourcePill}</div></div>
      <article>
        <h3>${esc(selected.title)}</h3>
        <div class="meta">${esc(fmtDate(selected.date))}${selected.important ? " · major event" : ""}</div>
        ${summarySection}
        ${minutesSection}
        <section><h4>Participants</h4><div class="chips">${participants || "<span class='muted-text'>None</span>"}</div></section>
        <section><h4>Documents</h4><ul>${docs || "<li class='muted-text'>None</li>"}</ul></section>
        ${contributionsSection}
        <section><h4>Tags</h4><div class="chips">${tags || "<span class='muted-text'>None</span>"}</div></section>
      </article>
    `;

    let dividerInserted = false;
    let timelineHtml = `<div class="panel-header"><h2>Timeline</h2></div><div class="timeline-list">`;
    for (const [year, list] of years) {
      timelineHtml += `<div class="year-block"><div class="year">${esc(year)}</div>`;
      for (const event of list) {
        const style = getStyle(event.type);
        const tone = buildTone(style.color);
        const isMajor = Boolean(event.important);
        const isSelected = selected.id === event.id;
        const cls = isMajor ? "timeline-item major" : "timeline-item minor";
        const sourcePill = event.source_name && event.source_color
          ? renderPill(event.source_name, event.source_color, "small")
          : "";
        if (!dividerInserted && event.date >= todayKey) {
          timelineHtml += `
            <div class="timeline-divider" aria-hidden="true">
              <span class="timeline-divider-line"></span>
              <span class="timeline-divider-pill">Future</span>
            </div>
          `;
          dividerInserted = true;
        }
        timelineHtml += `
          <button class="${cls}${isSelected ? " selected" : ""}" data-event-id="${esc(event.id)}" title="${esc(event.title)} · ${esc(fmtDate(event.date))} · ${esc(style.label)}">
            <span class="timeline-rail">
              <span class="dot" ${dotStyleAttr(tone)}></span>
              <span class="connector"></span>
            </span>
            <span class="timeline-content">
              <span class="date">${esc(isMajor ? fmtDate(event.date) : fmtCompactDate(event.date))}</span>
              <span class="title">${esc(event.title)}</span>
              <span class="timeline-pills">${renderPill(style.label, style.color, "small")}${sourcePill}</span>
              ${isMajor ? `<span class="short">${esc(event.short_label || event.title)}</span>` : ""}
            </span>
          </button>
        `;
      }
      timelineHtml += "</div>";
    }
    timelineHtml += "</div>";
    timeline.innerHTML = timelineHtml;
    timeline.scrollTop = state.timelineScrollTop;

    const search = root.querySelector("#search");
    const searchClear = root.querySelector(".search-clear");
    search?.addEventListener("input", (ev) => {
      state.query = ev.target.value;
      persistState();
      render();
    });
    searchClear?.addEventListener("click", () => {
      state.query = "";
      persistState();
      render();
      const nextSearch = root.querySelector("#search");
      nextSearch?.focus();
    });
    if (searchWasFocused && search) {
      search.focus();
      if (searchSelectionStart !== null && searchSelectionEnd !== null) {
        search.setSelectionRange(searchSelectionStart, searchSelectionEnd);
      }
    }
    timeline.addEventListener("scroll", () => {
      state.timelineScrollTop = timeline.scrollTop;
      persistState();
    }, { passive: true });
    timeline.querySelectorAll("[data-event-id]").forEach((el) => {
      el.addEventListener("click", () => {
        state.selectedId = el.getAttribute("data-event-id");
        state.timelineScrollTop = timeline.scrollTop;
        persistState();
        render();
      });
    });
    persistState();
  }

  loadState();
  render();

  window.addEventListener("pagehide", () => {
    const timeline = root.querySelector("#timeline");
    if (timeline) state.timelineScrollTop = timeline.scrollTop;
    persistState();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key !== "/" || event.ctrlKey || event.metaKey || event.altKey) return;
    if (isEditableTarget(event.target)) return;
    const search = root.querySelector("#search");
    if (!search) return;
    event.preventDefault();
    search.focus();
    const valueLength = search.value.length;
    search.setSelectionRange(valueLength, valueLength);
  });
})();
</script>
</body>
</html>
